<div class="content">
    <div class="banner-wrap vh-100 vw-100 d-flex align-items-center justify-content-center text-white">
        <main class="text-center">
            <div class="container mt-4" id="logGoals">
                <h2>Log Your Fitness Goals</h2>
                <form id="goalForm">
                    <!-- Exercise Selection -->
                    <div class="form-row">
                        <div class="form-group">
                            <label>Exercise Type</label>
                            <select class="form-control" id="goalExercise" required>
                                <option value="Running">Running</option>
                                <option value="Cycling">Cycling</option>
                                <option value="Strength Training">Strength Training</option>
                                <option value="Aerobics">Aerobics</option>
                                <option value="Pilates">Pilates</option>
                                <option value="Swimming">Swimming</option>
                                <option value="Yoga">Yoga</option>
                                <option value="Balance Workout">Balance Workout</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Duration (minutes)</label>
                            <input type="number" class="form-control" id="goalDuration" placeholder="Enter minutes" required>
                        </div>
                    </div>

                    <!-- Weight Loss Goal -->
                    <div class="form-row">
                        <div class="form-group">
                            <label>Target Weight (kg)</label>
                            <input type="number" class="form-control" id="goalWeightLoss" placeholder="Enter weight loss goal" required>
                        </div>
                        <div class="form-group">
                            <label>Start Date</label>
                            <input type="date" class="form-control" id="goalStartDate" required>
                        </div>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" class="btn btn-primary">Save Goals</button>
                </form>
                <br>
            </div>

            <!-- Goal Display Section -->
            <div class="container mt-4">
                <h2>Saved Goals</h2>
                <div class="button-container">
                    <button id="viewGoalsBtn" class="btn btn-primary">View My Goals</button>
                </div>
                <br>
                <ul class="list-group" id="goalList"></ul>
                <br>
            </div>

            <!-- Progress Section -->
            <div class="container mt-4">
                <h2>Progress</h2>
                <div class="button-container">
                    <button id="viewProgressBtn" class="btn btn-primary">View Progress</button>
                </div>       
                <div id="progressSection" style="display: none;">
                    <div class="card">
                        <div class="card-body">
                            <ul id="progressList" class="list-group mt-3"></ul>
                        </div>
                    </div>
                </div>
            </div>
        </main>
